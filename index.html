<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="assets/favicon.svg" />
    <title>Kanban — Launch Career</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'] },
            colors: {
              primary: '#635FC7',
              primarySoft: '#A8A4FF',
              bgLight: '#F4F7FD',
              panel: '#FFFFFF',
              muted: '#828FA3',
              divider: 'rgba(32,33,44,0.06)',
              blueDot: '#4CB3E6',
              greenDot: '#3ECF8E'
            },
            boxShadow: { card: '0 6px 18px rgba(26,30,43,0.06)' }
          }
        }
      }
    </script>
    <style>
      :root { --sidebar-pad: 24px; }
      .dot { width:10px; height:10px; border-radius:9999px; display:inline-block; }
      .active-pill {
        margin-left: calc(var(--sidebar-pad) * -1);
        width: calc(100% + var(--sidebar-pad));
        border-top-left-radius: 0;
        border-bottom-left-radius: 0;
        border-top-right-radius: 9999px;
        border-bottom-right-radius: 9999px;
      }
      html,body { height:100%; margin:0; }
      @media (max-width: 767px) {
        aside { display:none; }
        .mobile-title { font-size: 24px; line-height: 30px; }
      }
      @media (min-width: 768px) { .col-fixed { width: 320px; } }
      .col-fixed, .card, .active-pill { transition: all 180ms ease-in-out; }
      .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,30,43,0.12); cursor: pointer; }
      .card { animation: slideIn 0.3s ease; }
      @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ---- Shared modal styles ---- */
      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 50;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.2s ease;
      }
      .modal-backdrop.active { display: flex; }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .modal {
        background: white;
        border-radius: 8px;
        padding: 32px;
        max-width: 480px;
        width: calc(100% - 32px);
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        animation: slideUp 0.3s ease;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .form-input, .form-textarea, .form-select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid rgba(130,143,163,0.25);
        border-radius: 4px;
        font-size: 13px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        box-sizing: border-box;
      }
      .form-input:focus, .form-textarea:focus, .form-select:focus {
        outline: none;
        border-color: #635FC7;
      }
      .form-textarea { min-height: 112px; resize: vertical; }
      .form-select {
        cursor: pointer;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='7' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='%23635FC7' stroke-width='2' fill='none' d='m1 1 4 4 4-4'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 16px center;
        padding-right: 40px;
      }
      .close-button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        color: #828FA3;
        font-size: 20px;
        transition: color 0.2s ease;
      }
      .close-button:hover { color: #EA5555; }

      /* ---- JSL05: Add Task button — mobile circle ---- */
      #addTaskBtnMobile {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #635FC7;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: #fff;
        font-weight: 400;
        line-height: 1;
        transition: background 0.2s ease;
        flex-shrink: 0;
      }
      #addTaskBtnMobile:hover { background: #A8A4FF; }

      /* ---- JSL05: Add Task button — desktop pill ---- */
      #addTaskBtnDesktop {
        background: #635FC7;
        color: #fff;
        border: none;
        border-radius: 9999px;
        padding: 10px 24px;
        font-size: 15px;
        font-weight: 700;
        font-family: 'Plus Jakarta Sans', sans-serif;
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.2s ease;
      }
      #addTaskBtnDesktop:hover { background: #A8A4FF; }

      /* ---- JSL05: Colored form labels in Add New Task modal ---- */
      .add-modal-label {
        display: block;
        font-size: 12px;
        font-weight: 700;
        color: #635FC7;
        margin-bottom: 8px;
      }

      @media (max-width: 767px) {
        .modal { padding: 24px; width: calc(100% - 24px); }
      }
    </style>
  </head>
  <body class="bg-bgLight min-h-screen font-sans text-neutral800 antialiased">
    <div class="min-h-screen flex w-full">

      <!-- ==================== Sidebar (JSL04) ==================== -->
      <aside class="hidden md:flex flex-col bg-white border-r" style="border-right:1px solid rgba(32,33,44,0.06); width:240px; padding:24px;">
        <div><img src="assets/logo-light.svg" alt="Kanban logo" class="w-36" /></div>
        <div class="mt-4 flex flex-col gap-3">
          <h4 class="text-[12px] tracking-wider text-muted font-semibold">ALL BOARDS <span class="text-muted opacity-80">(1)</span></h4>
          <div class="relative overflow-visible">
            <button class="active-pill bg-primary text-white font-semibold py-3 px-4 flex items-center gap-3 shadow-sm">
              <img src="assets/icon-board.svg" alt="" class="w-4 h-4" />
              <span class="text-[15px] leading-[23px] font-bold">Launch Career</span>
            </button>
          </div>
        </div>
        <div class="flex-1"></div>
      </aside>

      <!-- ==================== Main ==================== -->
      <main class="flex-1 min-h-screen">

        <!-- Mobile header (JSL04 preserved + JSL05 Add button) -->
        <div class="md:hidden bg-white border-b" style="border-bottom:1px solid rgba(32,33,44,0.06);">
          <div class="px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3">
              <img src="assets/logo-light.svg" alt="logo" class="w-9" />
              <div class="flex items-center gap-2">
                <h3 class="mobile-title font-bold leading-[30px]">Launch Career</h3>
                <svg width="14" height="14" viewBox="0 0 24 24" class="opacity-80" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M6 9l6 6 6-6" stroke="#20212C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
            </div>
            <!-- JSL05: mobile Add Task button -->
            <button id="addTaskBtnMobile" onclick="openAddTaskModal()" aria-label="Add new task">+</button>
          </div>
        </div>

        <!-- Desktop header (JSL04 preserved + JSL05 Add button) -->
        <div class="hidden md:block bg-white" style="border-bottom:1px solid rgba(32,33,44,0.06);">
          <div class="px-8 py-4 flex items-center justify-between">
            <h2 class="text-[18px] font-bold leading-[23px]">Launch Career</h2>
            <!-- JSL05: desktop Add Task button -->
            <button id="addTaskBtnDesktop" onclick="openAddTaskModal()">+ Add New Task</button>
          </div>
        </div>

        <!-- Board container (JSL04) -->
        <div class="px-6 md:px-10 py-6">
          <div id="boardContainer" class="flex flex-col md:flex-row md:items-start md:gap-8"></div>
        </div>

      </main>
    </div>

    <!-- ==================== JSL04: Edit Task Modal ==================== -->
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <div class="flex items-start justify-between mb-6">
          <h2 class="text-[18px] font-bold">Task</h2>
          <button class="close-button" id="closeButton" aria-label="Close modal">✕</button>
        </div>
        <form id="taskForm">
          <div class="mb-6">
            <label class="block text-[12px] font-bold text-muted mb-2" for="taskTitle">Title</label>
            <input type="text" id="taskTitle" class="form-input" required />
          </div>
          <div class="mb-6">
            <label class="block text-[12px] font-bold text-muted mb-2" for="taskDescription">Description</label>
            <textarea id="taskDescription" class="form-textarea"></textarea>
          </div>
          <div class="mb-6">
            <label class="block text-[12px] font-bold text-muted mb-2" for="taskStatus">Status</label>
            <select id="taskStatus" class="form-select">
              <option value="todo">Todo</option>
              <option value="doing">Doing</option>
              <option value="done">Done</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-primary hover:bg-primarySoft text-white font-bold py-3 px-4 rounded-full transition-colors">
            Save Changes
          </button>
        </form>
      </div>
    </div>

    <!-- ==================== JSL05: Add New Task Modal ==================== -->
    <div class="modal-backdrop" id="addTaskModalBackdrop">
      <div class="modal">
        <div class="flex items-start justify-between mb-6">
          <h2 class="text-[18px] font-bold">Add New Task</h2>
          <button class="close-button" id="closeAddTaskButton" aria-label="Close modal">✕</button>
        </div>
        <form id="addTaskForm">
          <div class="mb-6">
            <label class="add-modal-label" for="newTaskTitle">Title</label>
            <input
              type="text"
              id="newTaskTitle"
              class="form-input"
              placeholder="e.g. Take chilled break"
              required
            />
          </div>
          <div class="mb-6">
            <label class="add-modal-label" for="newTaskDescription">Description</label>
            <textarea
              id="newTaskDescription"
              class="form-textarea"
              placeholder="e.g Pet your dog, have a cup of coffee, dance to your favourite song and come back to crush this challenge."
            ></textarea>
          </div>
          <div class="mb-6">
            <label class="add-modal-label" for="newTaskStatus">Status</label>
            <select id="newTaskStatus" class="form-select">
              <option value="todo">todo</option>
              <option value="doing">doing</option>
              <option value="done">done</option>
            </select>
          </div>
          <button type="submit" class="w-full bg-primary hover:bg-primarySoft text-white font-bold py-3 px-4 rounded-full transition-colors">
            Create Task
          </button>
        </form>
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
